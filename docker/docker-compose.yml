version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orthogonality
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/orthogonality
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/orthogonality
      CORS_ORIGINS: http://localhost:3000,http://localhost:80,http://localhost
      MODEL_NAME: all-MiniLM-L6-v2
      SIMILARITY_THRESHOLD: "0.70"
      FAISS_INDEX_PATH: /app/data/faiss_index
    volumes:
      - faiss_data:/app/data
    ports:
      - "8000:8000"

  # ── React Frontend (nginx) ──────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  faiss_data:
